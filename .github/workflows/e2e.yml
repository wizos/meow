name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Decode google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > mobile/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: cd flutter_module && flutter pub get

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-ndk
            core/src/main/rust/mihomo-android-ffi/target
          key: cargo-${{ runner.os }}-x86_64-${{ hashFiles('core/src/main/rust/**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-x86_64-

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.2.13676358" "ndk;27.0.12077973"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install cargo-ndk
        run: command -v cargo-ndk || cargo install cargo-ndk

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK (x86_64)
        run: ./gradlew :mobile:assembleDebug -PTARGET_ABI=x86_64 -PCARGO_PROFILE=debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/build/outputs/apk/debug/mobile-debug.apk
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: mobile/build/outputs/apk/debug

      - name: Install ssserver
        run: |
          SS_VERSION="1.21.2"
          INSTALL_BIN="$HOME/.local/bin"
          mkdir -p "$INSTALL_BIN"
          curl -L "https://github.com/shadowsocks/shadowsocks-rust/releases/download/v${SS_VERSION}/shadowsocks-v${SS_VERSION}.x86_64-unknown-linux-gnu.tar.xz" | tar -xJ -C "$INSTALL_BIN"
          echo "$INSTALL_BIN" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
          key: avd-api-35-${{ runner.os }}

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Install emulator & system image
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "emulator" "system-images;android-35;google_apis;x86_64" "platforms;android-35"

      - name: Start emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator -avd test -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save &
          $ANDROID_HOME/platform-tools/adb wait-for-device
          # Wait for boot
          for i in $(seq 1 120); do
            if [ "$($ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; then
              echo "Emulator booted"
              break
            fi
            if [ "$i" = "120" ]; then
              echo "::error::Emulator failed to boot within 120s"
              exit 1
            fi
            sleep 1
          done
          $ANDROID_HOME/platform-tools/adb shell settings put global window_animation_scale 0
          $ANDROID_HOME/platform-tools/adb shell settings put global transition_animation_scale 0
          $ANDROID_HOME/platform-tools/adb shell settings put global animator_duration_scale 0

      - name: Run E2E tests
        env:
          SKIP_EMULATOR_BOOT: "true"
          APK: mobile/build/outputs/apk/debug/mobile-debug.apk
        run: ADB=$ANDROID_HOME/platform-tools/adb EMULATOR=$ANDROID_HOME/emulator/emulator SSSERVER=$HOME/.local/bin/ssserver ./test-e2e.sh

      - name: Stop emulator
        if: always()
        run: $ANDROID_HOME/platform-tools/adb emu kill || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screen_*.png
          if-no-files-found: ignore

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logcat
          path: e2e-logcat.log
          if-no-files-found: ignore

      - name: Upload UI dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-dumps
          path: ui_dump_*.xml
          if-no-files-found: ignore
